name: Kotlin Multiplatform Tests
on: [push]

jobs:
  jvm-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run JVM tests
        shell: bash
        run: |
          ./gradlew core:jvmTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-results-${{ matrix.os }}
          path: core/build/reports/tests/jvmTest/

  native-test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            gradle-target: macosArm64Test
            target-group: apple
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            gradle-target: linuxX64Test
            target-group: others
          - os: windows-latest
            rust-target: x86_64-pc-windows-gnu
            gradle-target: mingwX64Test
            target-group: others
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ matrix.rust-target }}-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-${{ matrix.rust-target }}-

      - name: Build Rust native library
        shell: bash
        run: |
          cd native
          cargo build --release --target ${{ matrix.rust-target }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Native tests
        shell: bash
        run: |
          ./gradlew core:${{ matrix.gradle-target }} -Pkgrpc.targets=${{ matrix.target-group }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-test-results-${{ matrix.gradle-target }}
          path: core/build/reports/tests/${{ matrix.gradle-target }}/
