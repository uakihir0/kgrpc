name: Kotlin Multiplatform Tests
on: [push]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: jvmTest
          - os: macos-latest
            target: jvmTest
          - os: windows-latest
            target: jvmTest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        shell: bash
        run: |
          ./gradlew core:${{ matrix.target }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.target }}
          path: core/build/reports/tests/
