name: Publish RELEASE Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-rust-apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-apple-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-apple-

      - name: Build Rust native libraries
        run: |
          cd native
          bash compile.sh \
            aarch64-apple-darwin x86_64-apple-darwin \
            aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: rust-apple
          path: native/target/

  build-rust-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-linux-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-linux-

      - name: Build Rust native library
        run: |
          cd native
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux
          path: native/target/

  build-rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-windows-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-windows-

      - name: Build Rust native library
        shell: bash
        run: |
          cd native
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows
          path: native/target/

  publish:
    needs: [build-rust-apple, build-rust-linux, build-rust-windows]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          passphrase: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          path: native/target
          merge-multiple: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle publish
        run: >
          ./gradlew
          -PmavenCentralUsername=${{secrets.OSSRH_USERNAME}}
          -PmavenCentralPassword=${{secrets.OSSRH_PASSWORD}}
          -PsigningInMemoryKeyId=${{secrets.OSSRH_GPG_SECRET_KEY_ID}}
          -PsigningInMemoryPassword=${{secrets.OSSRH_GPG_SECRET_KEY_PASSWORD}}
          publishAllPublicationsToMavenCentralRepository
