name: Publish RELEASE Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:

    strategy:
      matrix:
        include:
          - target: publishAllPublicationsToMavenCentralRepository
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          passphrase: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-apple-all-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-apple-all-

      - name: Build Rust native libraries
        run: |
          cd native
          bash compile.sh aarch64-apple-darwin x86_64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle publish
        run: >
          ./gradlew
          -PmavenCentralUsername=${{secrets.OSSRH_USERNAME}}
          -PmavenCentralPassword=${{secrets.OSSRH_PASSWORD}}
          -PsigningInMemoryKeyId=${{secrets.OSSRH_GPG_SECRET_KEY_ID}}
          -PsigningInMemoryPassword=${{secrets.OSSRH_GPG_SECRET_KEY_PASSWORD}}
          ${{ matrix.target }}
