name: Publish SNAPSHOT Package
on:
  push:
    branches:
      - main

jobs:
  build-rust-apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-apple-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-apple-

      - name: Build Rust native libraries
        run: |
          cd native
          bash compile.sh \
            aarch64-apple-darwin x86_64-apple-darwin \
            aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: rust-apple
          path: native/target/

  build-rust-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-linux-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-linux-

      - name: Build Rust native library
        run: |
          cd native
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux
          path: native/target/

  build-rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-windows-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-windows-

      - name: Build Rust native library
        shell: bash
        run: |
          cd native
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows
          path: native/target/

  publish:
    needs: [build-rust-apple, build-rust-linux, build-rust-windows]
    runs-on: macos-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          path: native/target
          merge-multiple: true

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: build -x check

      - name: Publish to Repsy
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: publishAllPublicationsToMavenRepository -x check
        env:
          USERNAME: ${{ secrets.REPSY_USERNAME }}
          PASSWORD: ${{ secrets.REPSY_PASSWORD }}
