name: Publish SNAPSHOT Package
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install cross (for Linux/Windows cross-compilation)
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-all-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-all-

      - name: Build Rust native libraries (all targets)
        run: |
          cd native
          bash compile.sh \
            aarch64-apple-darwin x86_64-apple-darwin \
            aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios \
            x86_64-unknown-linux-gnu x86_64-pc-windows-gnu

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: build -x check

      - name: Publish to Repsy
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: publishAllPublicationsToMavenRepository -x check
        env:
          USERNAME: ${{ secrets.REPSY_USERNAME }}
          PASSWORD: ${{ secrets.REPSY_PASSWORD }}
