name: Make SwiftPackage
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-apple-all-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            rust-apple-all-

      - name: Build Rust native libraries
        run: |
          cd native
          bash compile.sh aarch64-apple-darwin x86_64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Create SwiftPackage
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: all:createSwiftPackage -x check

      - name: Set Project Version
        run: |
          project_version=$(./gradlew version --no-daemon --console=plain -q)
          echo "PROJECT_VERSION=$project_version" >> $GITHUB_ENV

      - name: Commit Package to GitHub
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.email "a.urusihara@gmail.com"
          git config --global user.name "Akihiro Urushihara"
          cd ./all/swiftpackage/
          git init
          git add --all
          git commit -m "by GitHub Action CI (SHA ${GITHUB_SHA})"
          git remote add origin https://${GH_TOKEN}@github.com/uakihir0/kgrpc-spm.git
          git push -f origin HEAD:${{ env.PROJECT_VERSION }}
          git push -f origin HEAD:main
